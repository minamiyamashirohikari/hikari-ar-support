<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone安定版メニュー表示</title>
<script src="photo_data.js?v=20260702-photo10"></script>
<script src="menu_data.js?v=20260702-realglb"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Yu Gothic","Hiragino Sans",system-ui,sans-serif;background:#101817;color:#fff}video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#101817}.top{position:fixed;z-index:5;top:max(14px,env(safe-area-inset-top));left:12px;right:12px;display:flex;gap:8px}.top button,.top a{min-height:42px;border:0;border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.94);color:#102224;font-weight:900;font-size:14px;text-decoration:none}.top .primary{background:#2f787c;color:#fff}.status{position:fixed;z-index:4;top:calc(68px + env(safe-area-inset-top));left:12px;right:12px;text-align:center;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.75)}.stage{position:fixed;z-index:3;left:50%;top:40%;width:min(74vw,340px);transform:translate(-50%,-50%);display:grid;grid-template-columns:1fr 1fr;gap:clamp(26px,8vw,46px)}.food{position:relative;min-height:126px;display:grid;place-items:center}.food:before{content:"";position:absolute;bottom:18px;width:94%;height:22px;border-radius:999px;background:rgba(0,0,0,.18);filter:blur(11px)}.food:after{content:"";position:absolute;bottom:31px;width:108%;aspect-ratio:1/.38;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(232,222,204,.94));box-shadow:inset 0 -9px 18px rgba(90,60,30,.13),0 7px 20px rgba(0,0,0,.13)}.food img{position:relative;z-index:2;width:min(25vw,112px);height:min(22vw,96px);object-fit:cover;border-radius:50%;clip-path:ellipse(48% 39% at 50% 54%);transform:perspective(720px) rotateX(14deg) translateY(-22px);filter:saturate(1.08) contrast(1.06) drop-shadow(0 10px 9px rgba(0,0,0,.18))}.name{position:absolute;z-index:3;left:50%;bottom:-10px;transform:translateX(-50%);max-width:108%;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.9);color:#20231f;font-size:12px;font-weight:900;white-space:nowrap;box-shadow:0 6px 18px rgba(0,0,0,.14)}.bottom{position:fixed;z-index:5;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));display:grid;gap:9px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{border-radius:16px;padding:10px;background:rgba(255,255,255,.88);color:#20231f}.choice strong{display:block;margin-bottom:7px;font-size:15px}.choice button,.decide{width:100%;min-height:42px;border:0;border-radius:14px;background:#2f787c;color:#fff;font-weight:900;font-size:16px}.decide{background:#cf6038;border-radius:18px}.picker{display:none;position:fixed;z-index:10;inset:0;background:rgba(0,0,0,.45);padding:12px}.picker.show{display:block}.panel{margin-top:18vh;max-height:72vh;overflow:auto;background:#fffdf8;color:#20231f;border-radius:24px 24px 0 0;padding:14px}.head{position:sticky;top:-14px;display:flex;justify-content:space-between;align-items:center;background:#fffdf8;padding:12px 4px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.item{display:flex;align-items:center;gap:8px;border:1px solid #e4d8c8;border-radius:14px;padding:8px;background:#fff;text-align:left}.item img{width:48px;height:48px;object-fit:cover;border-radius:50%;clip-path:ellipse(48% 40% at 50% 54%)}
</style>
</head>
<body>
<video id="camera" playsinline webkit-playsinline muted autoplay></video>
<div class="top"><a href="choice-camera.html">戻る</a><button id="switchCamera">カメラ切替</button><button class="primary" id="startCamera">カメラ起動</button></div>
<div class="status" id="status">カメラ起動を押してください</div>
<div class="stage"><div class="food"><img id="leftImg" alt=""><div class="name" id="leftName"></div></div><div class="food"><img id="rightImg" alt=""><div class="name" id="rightName"></div></div></div>
<div class="bottom"><div class="choices"><div class="choice"><strong id="leftChoice"></strong><button data-side="left">左を変更</button></div><div class="choice"><strong id="rightChoice"></strong><button data-side="right">右を変更</button></div></div><button class="decide" id="decide">これにする</button></div>
<div class="picker" id="picker"><div class="panel"><div class="head"><h2 id="pickerTitle">料理を選ぶ</h2><button id="closePicker">閉じる</button></div><div class="grid" id="pickerGrid"></div></div></div>
<script>
(function(){const items=window.MENU_ITEMS||[];const KEY='senshakuSelectedIds';const CK='senshakuCameraMode';let stream=null;let targetSide='left';let mode=localStorage.getItem(CK)||'environment';const saved=JSON.parse(localStorage.getItem(KEY)||'[]');const current={left:Math.max(0,items.findIndex(x=>x.id===saved[0])),right:Math.max(1,items.findIndex(x=>x.id===saved[1]))};const $=id=>document.getElementById(id);function item(i){return items[i]||items[0]}function save(){localStorage.setItem(KEY,JSON.stringify([item(current.left).id,item(current.right).id]))}function status(t){$('status').textContent=t}function refresh(){const l=item(current.left),r=item(current.right);$('leftImg').src=l.image;$('leftImg').alt=l.name;$('leftName').textContent='左: '+l.name;$('leftChoice').textContent=l.name;$('rightImg').src=r.image;$('rightImg').alt=r.name;$('rightName').textContent='右: '+r.name;$('rightChoice').textContent=r.name;save()}async function startCam(){if(stream)stream.getTracks().forEach(t=>t.stop());try{stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:mode},width:{ideal:1280},height:{ideal:720}}});$('camera').srcObject=stream;await $('camera').play();status('中央に料理を表示しています')}catch(e){status('カメラ許可を確認してください')}}function openPicker(side){targetSide=side;$('pickerTitle').textContent=(side==='left'?'左':'右')+'の料理を選ぶ';$('pickerGrid').innerHTML=items.map((x,i)=>`<button class="item" data-index="${i}"><img src="${x.image}" alt="${x.name}"><span><strong>${x.name}</strong><br><small>${x.reading||''}</small></span></button>`).join('');document.querySelectorAll('.item').forEach(b=>b.addEventListener('click',()=>{current[targetSide]=Number(b.dataset.index);refresh();closePanel()}));$('picker').classList.add('show')}function closePanel(){$('picker').classList.remove('show')}document.querySelectorAll('.choice button').forEach(b=>b.addEventListener('click',()=>openPicker(b.dataset.side)));$('closePicker').addEventListener('click',closePanel);$('picker').addEventListener('click',e=>{if(e.target.id==='picker')closePanel()});$('startCamera').addEventListener('click',startCam);$('switchCamera').addEventListener('click',()=>{mode=mode==='environment'?'user':'environment';localStorage.setItem(CK,mode);startCam()});$('decide').addEventListener('click',()=>alert('候補を確認しました。\n左: '+item(current.left).name+'\n右: '+item(current.right).name));window.addEventListener('pagehide',()=>{if(stream)stream.getTracks().forEach(t=>t.stop())});refresh()})();
</script>
</body>
</html>

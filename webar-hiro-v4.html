<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hiroマーカー追従AR v4</title>
<script src="photo_data.js?v=20260702-photo10"></script>
<script src="menu_data.js?v=20260702-realglb"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Yu Gothic","Hiragino Sans",system-ui,sans-serif;background:#101817;color:#fff}video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#101817}.top{position:fixed;z-index:20;top:max(14px,env(safe-area-inset-top));left:12px;right:12px;display:flex;gap:8px}.top a,.top button{min-height:42px;border:0;border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.94);color:#102224;font-weight:900;font-size:14px;text-decoration:none}.top .primary{background:#2f787c;color:#fff}.status{position:fixed;z-index:18;top:calc(68px + env(safe-area-inset-top));left:12px;right:12px;text-align:center;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.8)}.ar-food{--yaw:0deg;--roll:0deg;position:fixed;z-index:12;width:118px;height:142px;transform:translate(-50%,-100%) rotateZ(var(--roll));pointer-events:none;opacity:0;transition:opacity .18s ease,left .12s linear,top .12s linear,transform .12s linear;perspective:700px}.ar-food.show{opacity:1}.ar-food:before{content:"";position:absolute;left:7%;right:7%;bottom:9px;height:18px;border-radius:999px;background:rgba(0,0,0,.22);filter:blur(10px);transform:scale(.62)}.beam{position:absolute;left:50%;bottom:13px;width:70px;height:104px;transform:translateX(-50%);background:radial-gradient(ellipse at top,rgba(255,255,255,.36),rgba(255,255,255,.07) 45%,rgba(255,255,255,0) 78%);clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);filter:blur(.3px)}.plate{position:absolute;left:50%;bottom:31px;width:120px;height:48px;transform:translateX(-50%) rotateY(var(--yaw)) rotateX(61deg);border-radius:50%;background:linear-gradient(180deg,#fff,#e8ddca 62%,#cdbf9f);box-shadow:inset 0 -10px 18px rgba(90,60,30,.18),0 11px 18px rgba(0,0,0,.24)}.plate:after{content:"";position:absolute;left:6%;right:6%;bottom:-9px;height:16px;border-radius:50%;background:linear-gradient(180deg,#d7cab0,#a99778);opacity:.9}.ar-food img{position:absolute;z-index:2;left:50%;bottom:48px;width:100px;height:78px;object-fit:cover;border-radius:50%;clip-path:ellipse(49% 38% at 50% 55%);transform:translateX(-50%) rotateY(var(--yaw)) rotateX(24deg) translateY(-10px);filter:saturate(1.1) contrast(1.08) drop-shadow(0 11px 8px rgba(0,0,0,.24));box-shadow:inset 0 -14px 20px rgba(0,0,0,.22)}.ar-food img:after{content:""}.label{display:none}.bottom{position:fixed;z-index:20;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));display:grid;gap:9px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{border-radius:16px;padding:10px;background:rgba(255,255,255,.88);color:#20231f}.choice strong{display:block;margin-bottom:7px;font-size:15px}.choice button,.decide{width:100%;min-height:42px;border:0;border-radius:14px;background:#2f787c;color:#fff;font-weight:900;font-size:16px}.decide{background:#cf6038;border-radius:18px}.picker{display:none;position:fixed;z-index:30;inset:0;background:rgba(0,0,0,.45);padding:12px}.picker.show{display:block}.panel{margin-top:18vh;max-height:72vh;overflow:auto;background:#fffdf8;color:#20231f;border-radius:24px 24px 0 0;padding:14px}.head{position:sticky;top:-14px;display:flex;justify-content:space-between;align-items:center;background:#fffdf8;padding:12px 4px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.item{display:flex;align-items:center;gap:8px;border:1px solid #e4d8c8;border-radius:14px;padding:8px;background:#fff;text-align:left}.item img{width:48px;height:48px;object-fit:cover;border-radius:50%;clip-path:ellipse(48% 40% at 50% 54%)}canvas{display:none}
</style>
</head>
<body>
<video id="camera" playsinline webkit-playsinline muted autoplay></video>
<canvas id="scan" width="160" height="120"></canvas>
<div class="top"><a href="choice-camera.html">戻る</a><button id="switchCamera">カメラ切替</button><button class="primary" id="startCamera">カメラ起動</button></div>
<div class="status" id="status">Hiroマーカーを映すと料理が浮かびます</div>
<div class="ar-food" id="leftFloat"><div class="beam"></div><div class="plate"></div><img id="leftImg" alt=""><div class="label" id="leftLabel"></div></div>
<div class="ar-food" id="rightFloat"><div class="beam"></div><div class="plate"></div><img id="rightImg" alt=""><div class="label" id="rightLabel"></div></div>
<div class="bottom"><div class="choices"><div class="choice"><strong id="leftChoice"></strong><button data-side="left">左を変更</button></div><div class="choice"><strong id="rightChoice"></strong><button data-side="right">右を変更</button></div></div><button class="decide" id="decide">これにする</button></div>
<div class="picker" id="picker"><div class="panel"><div class="head"><h2 id="pickerTitle">料理を選ぶ</h2><button id="closePicker">閉じる</button></div><div class="grid" id="pickerGrid"></div></div></div>
<script>
(function(){const items=window.MENU_ITEMS||[];const KEY='senshakuSelectedIds';const CK='senshakuCameraMode';let stream=null,mode=localStorage.getItem(CK)||'environment',targetSide='left',timer=null;const saved=JSON.parse(localStorage.getItem(KEY)||'[]');const current={left:Math.max(0,items.findIndex(x=>x.id===saved[0])),right:Math.max(1,items.findIndex(x=>x.id===saved[1]))};const $=id=>document.getElementById(id);function item(i){return items[i]||items[0]}function save(){localStorage.setItem(KEY,JSON.stringify([item(current.left).id,item(current.right).id]))}function status(t){$('status').textContent=t}function refresh(){const l=item(current.left),r=item(current.right);$('leftImg').src=l.image;$('leftImg').alt=l.name;$('leftLabel').textContent='左: '+l.name;$('leftChoice').textContent=l.name;$('rightImg').src=r.image;$('rightImg').alt=r.name;$('rightLabel').textContent='右: '+r.name;$('rightChoice').textContent=r.name;save()}async function startCam(){if(stream)stream.getTracks().forEach(t=>t.stop());try{stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:mode},width:{ideal:1280},height:{ideal:720}}});$('camera').srcObject=stream;await $('camera').play();status('Hiroマーカーを映してください');if(timer)clearInterval(timer);timer=setInterval(scanMarker,120)}catch(e){status('カメラ許可を確認してください')}}function mapPoint(x,y,vw,vh){const W=innerWidth,H=innerHeight,s=Math.max(W/vw,H/vh),ox=(W-vw*s)/2,oy=(H-vh*s)/2;return{x:ox+x*s,y:oy+y*s,s}}function setFood(el,mark,side){const p=mapPoint(mark.cx,mark.cy,mark.vw,mark.vh),size=Math.max(82,Math.min(142,mark.w*p.s*1.05)),yaw=Math.max(-24,Math.min(24,(mark.cx/mark.vw-.5)*42+(side==='left'?-8:8))),roll=Math.max(-9,Math.min(9,(mark.cy/mark.vh-.5)*-10));el.style.width=size+'px';el.style.height=size*1.22+'px';el.style.left=p.x+'px';el.style.top=Math.max(120,p.y-mark.h*p.s*.18)+'px';el.style.setProperty('--yaw',yaw+'deg');el.style.setProperty('--roll',roll+'deg');el.classList.add('show')}function hideFood(){leftFloat.classList.remove('show');rightFloat.classList.remove('show')}function scanMarker(){const v=$('camera');if(!v.videoWidth){hideFood();return}const c=$('scan'),ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(v,0,0,c.width,c.height);const d=ctx.getImageData(0,0,c.width,c.height).data,seen=new Uint8Array(c.width*c.height),marks=[];function dark(i){const r=d[i*4],g=d[i*4+1],b=d[i*4+2];return r+g+b<210}for(let y=0;y<c.height;y+=2){for(let x=0;x<c.width;x+=2){const start=y*c.width+x;if(seen[start]||!dark(start))continue;let q=[start],minX=x,maxX=x,minY=y,maxY=y,count=0;seen[start]=1;for(let qi=0;qi<q.length;qi++){const p=q[qi],px=p%c.width,py=(p/c.width)|0;count++;if(px<minX)minX=px;if(px>maxX)maxX=px;if(py<minY)minY=py;if(py>maxY)maxY=py;[[2,0],[-2,0],[0,2],[0,-2]].forEach(([dx,dy])=>{const nx=px+dx,ny=py+dy;if(nx<0||ny<0||nx>=c.width||ny>=c.height)return;const ni=ny*c.width+nx;if(!seen[ni]&&dark(ni)){seen[ni]=1;q.push(ni)}})}const w=maxX-minX,h=maxY-minY,area=w*h,ratio=w/(h||1),fill=count/(area||1);if(count>90&&w>14&&h>14&&ratio>.55&&ratio<1.8&&fill>.08){marks.push({cx:(minX+maxX)/2,cy:(minY+maxY)/2,w,h,vw:c.width,vh:c.height,score:count})}}}marks.sort((a,b)=>b.score-a.score);const picked=[];for(const m of marks){if(picked.every(p=>Math.hypot(p.cx-m.cx,p.cy-m.cy)>24))picked.push(m);if(picked.length===2)break}if(picked.length===0){hideFood();status('Hiroマーカーを映してください');return}picked.sort((a,b)=>a.cx-b.cx);if(picked.length===1){setFood(leftFloat,{...picked[0],cx:picked[0].cx-picked[0].w*.55},'left');setFood(rightFloat,{...picked[0],cx:picked[0].cx+picked[0].w*.55},'right')}else{setFood(leftFloat,picked[0],'left');setFood(rightFloat,picked[1],'right')}status('Hiroマーカーから料理を浮かせています')}function openPicker(side){targetSide=side;$('pickerTitle').textContent=(side==='left'?'左':'右')+'の料理を選ぶ';$('pickerGrid').innerHTML=items.map((x,i)=>`<button class="item" data-index="${i}"><img src="${x.image}" alt="${x.name}"><span><strong>${x.name}</strong><br><small>${x.reading||''}</small></span></button>`).join('');document.querySelectorAll('.item').forEach(b=>b.addEventListener('click',()=>{current[targetSide]=Number(b.dataset.index);refresh();closePanel()}));$('picker').classList.add('show')}function closePanel(){$('picker').classList.remove('show')}document.querySelectorAll('.choice button').forEach(b=>b.addEventListener('click',()=>openPicker(b.dataset.side)));$('closePicker').addEventListener('click',closePanel);$('picker').addEventListener('click',e=>{if(e.target.id==='picker')closePanel()});$('startCamera').addEventListener('click',startCam);$('switchCamera').addEventListener('click',()=>{mode=mode==='environment'?'user':'environment';localStorage.setItem(CK,mode);startCam()});$('decide').addEventListener('click',()=>alert('候補を確認しました。\\n左: '+item(current.left).name+'\n右: '+item(current.right).name));window.addEventListener('pagehide',()=>{if(timer)clearInterval(timer);if(stream)stream.getTracks().forEach(t=>t.stop())});refresh()})();
</script>
</body>
</html>

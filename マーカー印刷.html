<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARマーカー印刷</title>
<style>
  body { margin: 0; font-family: system-ui, "Yu Gothic", sans-serif; background: #f7f4ee; color: #2f2a24; }
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  h1 { margin: 0 0 8px; }
  p { color: #60574d; line-height: 1.7; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
  button, a { border: 0; border-radius: 8px; padding: 12px 16px; min-height: 48px; font-weight: 800; text-decoration: none; cursor: pointer; }
  button { background: #2f6f73; color: #fff; }
  a { background: #fff; color: #2f2a24; border: 1px solid #ded8cc; display: inline-flex; align-items: center; }
  .sheet { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 20px; }
  .marker { background: #fff; border: 1px solid #ded8cc; border-radius: 8px; padding: 20px; text-align: center; break-inside: avoid; }
  .marker img { width: min(100%, 320px); }
  .marker strong { display: block; font-size: 24px; margin-bottom: 12px; }
  @media (max-width: 700px) { .sheet { grid-template-columns: 1fr; } }
  @media print {
    body { background: #fff; }
    .actions, .note { display: none; }
    .marker { border: 2px solid #111; }
  }
</style>
</head>
<body>
<main>
  <h1>ARマーカー印刷</h1>
  <p class="note">WebAR本番では、左にHiroマーカー、右にKanjiマーカーを使用します。同じマーカー2枚では左右を別々に認識しにくいため、必ず2種類を印刷してください。</p>
  <div class="actions">
    <button onclick="window.print()">印刷する</button>
    <a href="選択支援メニュー.html">選択画面に戻る</a>
  </div>
  <section class="sheet">
    <article class="marker">
      <strong>左: Hiroマーカー</strong>
      <img src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/data/images/hiro.png" alt="左のHiroマーカー">
    </article>
    <article class="marker">
      <strong>右: Kanjiマーカー</strong>
      <img src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/data/images/kanji.png" alt="右のKanjiマーカー">
    </article>
  </section>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARマーカー印刷</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
    background: #f7f4ee;
    color: #2f2a24;
  }
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 40px); }
  p { color: #60574d; line-height: 1.7; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 24px; }
  button,
  a {
    border-radius: 12px;
    padding: 14px 18px;
    min-height: 52px;
    font-weight: 900;
    text-decoration: none;
    cursor: pointer;
  }
  button { border: 0; background: #2f6f73; color: #fff; }
  a {
    display: inline-flex;
    align-items: center;
    background: #fff;
    color: #2f2a24;
    border: 1px solid #ded8cc;
  }
  .sheet {
    display: grid;
    grid-template-columns: minmax(240px, 520px);
    justify-content: center;
    gap: 22px;
    margin-top: 20px;
  }
  .marker {
    background: #fff;
    border: 1px solid #ded8cc;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    break-inside: avoid;
  }
  .marker img {
    display: block;
    width: min(100%, 420px);
    margin: 0 auto;
  }
  .marker strong {
    display: block;
    font-size: 28px;
    margin-bottom: 16px;
  }
  @media print {
    body { background: #fff; }
    main { max-width: none; padding: 0; }
    .actions,
    .note { display: none; }
    .marker { border: 2px solid #111; }
  }
</style>
</head>
<body>
<main>
  <h1>ARマーカー印刷</h1>
  <p class="note">WebAR本番ではHiroマーカー1枚を使用します。1枚のマーカー上に左右2品を同時表示するため、認識が安定します。</p>
  <div class="actions">
    <button type="button" onclick="window.print()">印刷する</button>
    <a href="choice-camera.html">選択画面に戻る</a>
  </div>
  <section class="sheet" aria-label="印刷用ARマーカー">
    <article class="marker">
      <strong>Hiroマーカー</strong>
      <img src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/data/images/hiro.png" alt="Hiroマーカー">
    </article>
  </section>
</main>
</body>
</html>
